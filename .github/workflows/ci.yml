name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches requires-python (>=3.10) and the classifiers in pyproject.toml.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      # --locked fails if uv.lock is stale, so CI also guards the lockfile.
      - name: Install dependencies
        run: uv sync --locked --group dev

      # Tests mock the `firmauy` subprocess, so no CLI or smart card is needed.
      - name: Run tests
        run: uv run --group dev pytest -q
