name: Publish

# Publishes to PyPI when a version tag (e.g. v0.1.1) is pushed. Uses PyPI
# Trusted Publishing (OIDC): no API token or secret is stored in the repo.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The publisher registered on PyPI must match this environment name.
    environment:
      name: pypi
      url: https://pypi.org/project/firmauy-mcp-inspect/
    permissions:
      id-token: write        # mint the OIDC token PyPI verifies; no secrets needed
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
